<svg viewBox="0 0 860 600" width="860" height="600" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect width="860" height="600" fill="#0f0f1a" rx="16"/>

  <!-- Title -->
  <text x="430" y="36" fill="#f1f5f9" font-size="17" font-weight="800" text-anchor="middle">⚽ Mondial 2026 — Architecture</text>
  <text x="430" y="54" fill="#475569" font-size="11" text-anchor="middle">React + Vite · Supabase · worldcup26.ir API · Netlify</text>

  <!-- ═══ USER / BROWSER LAYER ═══ -->
  <rect x="20" y="70" width="820" height="100" rx="10" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
  <text x="430" y="88" fill="#475569" font-size="10" text-anchor="middle" font-weight="600">USER / BROWSER</text>

  <!-- React box -->
  <rect x="40" y="96" width="150" height="58" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="115" y="119" fill="#93c5fd" font-size="12" font-weight="700" text-anchor="middle">React + Vite</text>
  <text x="115" y="134" fill="#475569" font-size="9" text-anchor="middle">pgmondial2026.netlify.app</text>
  <text x="115" y="146" fill="#475569" font-size="9" text-anchor="middle">SPA — no SSR</text>

  <!-- matches.js box -->
  <rect x="210" y="96" width="150" height="58" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="285" y="119" fill="#e2e8f0" font-size="12" font-weight="700" text-anchor="middle">matches.js</text>
  <text x="285" y="134" fill="#475569" font-size="9" text-anchor="middle">104 matches — static</text>
  <text x="285" y="146" fill="#475569" font-size="9" text-anchor="middle">Hebrew team names + mapping</text>

  <!-- localStorage box -->
  <rect x="380" y="96" width="150" height="58" rx="8" fill="#1a2a1a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="455" y="119" fill="#86efac" font-size="12" font-weight="700" text-anchor="middle">localStorage</text>
  <text x="455" y="134" fill="#475569" font-size="9" text-anchor="middle">User session</text>
  <text x="455" y="146" fill="#475569" font-size="9" text-anchor="middle">{ id, phone, nickname }</text>

  <!-- Netlify box -->
  <rect x="550" y="96" width="140" height="58" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="620" y="119" fill="#e2e8f0" font-size="12" font-weight="700" text-anchor="middle">Netlify CDN</text>
  <text x="620" y="134" fill="#475569" font-size="9" text-anchor="middle">dist/ → static hosting</text>
  <text x="620" y="146" fill="#475569" font-size="9" text-anchor="middle">VITE_SUPABASE_* env vars</text>

  <!-- Pages box -->
  <rect x="710" y="96" width="120" height="58" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="770" y="112" fill="#e2e8f0" font-size="10" font-weight="700" text-anchor="middle">Pages</text>
  <text x="770" y="124" fill="#475569" font-size="9" text-anchor="middle">MatchesPage</text>
  <text x="770" y="135" fill="#475569" font-size="9" text-anchor="middle">LeaderboardPage</text>
  <text x="770" y="146" fill="#475569" font-size="9" text-anchor="middle">AdminPage · StatsPage</text>

  <!-- ═══ ARROWS DOWN ═══ -->
  <!-- React → Supabase -->
  <line x1="115" y1="154" x2="115" y2="220" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="111,216 119,216 115,222" fill="#7c3aed"/>
  <text x="122" y="192" fill="#7c3aed" font-size="9">REST API</text>

  <!-- React → External API -->
  <line x1="285" y1="154" x2="680" y2="222" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="676,218 684,218 680,224" fill="#f59e0b"/>
  <text x="460" y="186" fill="#f59e0b" font-size="9">fetch()</text>

  <!-- ═══ SUPABASE LAYER ═══ -->
  <rect x="20" y="228" width="480" height="210" rx="10" fill="#0f172a" stroke="#7c3aed" stroke-width="2"/>
  <text x="260" y="248" fill="#a78bfa" font-size="11" text-anchor="middle" font-weight="700">SUPABASE — PostgreSQL + REST API</text>

  <!-- users table -->
  <rect x="36" y="258" width="105" height="70" rx="6" fill="#1e293b" stroke="#334155"/>
  <text x="88" y="275" fill="#e2e8f0" font-size="10" font-weight="700" text-anchor="middle">users</text>
  <line x1="36" y1="280" x2="141" y2="280" stroke="#334155"/>
  <text x="88" y="292" fill="#64748b" font-size="8.5" text-anchor="middle">id · phone · nickname</text>
  <text x="88" y="304" fill="#64748b" font-size="8.5" text-anchor="middle">created_at</text>
  <text x="88" y="316" fill="#475569" font-size="8" text-anchor="middle">auth: phone lookup</text>
  <text x="88" y="326" fill="#475569" font-size="8" text-anchor="middle">no Supabase Auth</text>

  <!-- predictions table -->
  <rect x="156" y="258" width="125" height="70" rx="6" fill="#1e293b" stroke="#334155"/>
  <text x="218" y="275" fill="#e2e8f0" font-size="10" font-weight="700" text-anchor="middle">predictions</text>
  <line x1="156" y1="280" x2="281" y2="280" stroke="#334155"/>
  <text x="218" y="292" fill="#64748b" font-size="8.5" text-anchor="middle">user_id · match_id</text>
  <text x="218" y="304" fill="#64748b" font-size="8.5" text-anchor="middle">prediction (1/X/2)</text>
  <text x="218" y="316" fill="#475569" font-size="8" text-anchor="middle">UPSERT on save</text>
  <text x="218" y="326" fill="#475569" font-size="8" text-anchor="middle">locked after kickoff</text>

  <!-- score_predictions table -->
  <rect x="296" y="258" width="130" height="70" rx="6" fill="#1e293b" stroke="#334155"/>
  <text x="361" y="272" fill="#e2e8f0" font-size="10" font-weight="700" text-anchor="middle">score_predictions</text>
  <line x1="296" y1="278" x2="426" y2="278" stroke="#334155"/>
  <text x="361" y="290" fill="#64748b" font-size="8.5" text-anchor="middle">user_id · match_id</text>
  <text x="361" y="302" fill="#64748b" font-size="8.5" text-anchor="middle">home_score · away_score</text>
  <text x="361" y="314" fill="#475569" font-size="8" text-anchor="middle">optional exact score</text>
  <text x="361" y="326" fill="#475569" font-size="8" text-anchor="middle">bonus +3 if correct</text>

  <!-- results table -->
  <rect x="440" y="258" width="48" height="70" rx="6" fill="#1e293b" stroke="#334155"/>
  <text x="464" y="272" fill="#e2e8f0" font-size="9" font-weight="700" text-anchor="middle">results</text>
  <line x1="440" y1="277" x2="488" y2="277" stroke="#334155"/>
  <text x="464" y="289" fill="#64748b" font-size="8" text-anchor="middle">match_id</text>
  <text x="464" y="300" fill="#64748b" font-size="8" text-anchor="middle">result</text>
  <text x="464" y="311" fill="#475569" font-size="7.5" text-anchor="middle">home/draw</text>
  <text x="464" y="322" fill="#475569" font-size="7.5" text-anchor="middle">/away</text>

  <!-- RLS note -->
  <rect x="36" y="342" width="456" height="24" rx="5" fill="#2d1a1a" stroke="#7f1d1d"/>
  <text x="264" y="358" fill="#fca5a5" font-size="9.5" text-anchor="middle">🔒 RLS enabled — each user sees only their own predictions and score_predictions</text>

  <!-- Scoring formula -->
  <rect x="36" y="376" width="456" height="50" rx="5" fill="#0f172a" stroke="#1e293b"/>
  <text x="264" y="394" fill="#94a3b8" font-size="9.5" text-anchor="middle" font-weight="700">SCORING LOGIC</text>
  <text x="264" y="408" fill="#64748b" font-size="9" text-anchor="middle">Correct outcome (1/X/2)  →  +1 pt</text>
  <text x="264" y="420" fill="#64748b" font-size="9" text-anchor="middle">Exact score match (home_score &amp; away_score)  →  +3 bonus  (4 pts total)</text>

  <!-- ═══ EXTERNAL API LAYER ═══ -->
  <rect x="516" y="228" width="324" height="210" rx="10" fill="#0f172a" stroke="#f59e0b" stroke-width="2"/>
  <text x="678" y="248" fill="#f59e0b" font-size="11" text-anchor="middle" font-weight="700">worldcup26.ir — External API</text>

  <!-- Endpoint box -->
  <rect x="532" y="258" width="292" height="56" rx="6" fill="#1e293b" stroke="#334155"/>
  <text x="678" y="276" fill="#e2e8f0" font-size="11" font-weight="700" text-anchor="middle">GET /get/games</text>
  <text x="678" y="290" fill="#64748b" font-size="9" text-anchor="middle">home_team_name_en · away_team_name_en</text>
  <text x="678" y="302" fill="#64748b" font-size="9" text-anchor="middle">home_score · away_score · finished ("TRUE")</text>

  <!-- Usage box -->
  <rect x="532" y="326" width="292" height="100" rx="6" fill="#1a2a1a" stroke="#15803d"/>
  <text x="678" y="344" fill="#86efac" font-size="10" font-weight="700" text-anchor="middle">How the app uses API data</text>
  <text x="678" y="359" fill="#64748b" font-size="9" text-anchor="middle">✓  Live scores display (MatchesPage)</text>
  <text x="678" y="372" fill="#64748b" font-size="9" text-anchor="middle">✓  Derive outcome if results table is empty</text>
  <text x="678" y="385" fill="#64748b" font-size="9" text-anchor="middle">✓  Exact score bonus calc (LeaderboardPage)</text>
  <text x="678" y="398" fill="#64748b" font-size="9" text-anchor="middle">✓  Admin auto-sync → upsert into results table</text>
  <text x="678" y="413" fill="#f59e0b" font-size="8.5" text-anchor="middle">⚠ results table takes priority over API outcome</text>

  <!-- ═══ BOTTOM FLOW ═══ -->
  <rect x="20" y="452" width="820" height="130" rx="10" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
  <text x="430" y="470" fill="#475569" font-size="10" text-anchor="middle" font-weight="600">DATA FLOW</text>

  <!-- Flow boxes -->
  <rect x="36" y="480" width="140" height="88" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="106" y="497" fill="#93c5fd" font-size="10" font-weight="700" text-anchor="middle">Login</text>
  <text x="106" y="511" fill="#64748b" font-size="8.5" text-anchor="middle">Enter phone →</text>
  <text x="106" y="522" fill="#64748b" font-size="8.5" text-anchor="middle">SELECT users</text>
  <text x="106" y="534" fill="#64748b" font-size="8.5" text-anchor="middle">Found → localStorage</text>
  <text x="106" y="546" fill="#64748b" font-size="8.5" text-anchor="middle">New → INSERT + nickname</text>
  <text x="106" y="558" fill="#64748b" font-size="8.5" text-anchor="middle">session stored locally</text>

  <text x="200" y="524" fill="#334155" font-size="18" text-anchor="middle">→</text>

  <rect x="216" y="480" width="160" height="88" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="296" y="497" fill="#93c5fd" font-size="10" font-weight="700" text-anchor="middle">MatchesPage</text>
  <text x="296" y="511" fill="#64748b" font-size="8.5" text-anchor="middle">Load: predictions + results</text>
  <text x="296" y="522" fill="#64748b" font-size="8.5" text-anchor="middle">+ score_predictions + API</text>
  <text x="296" y="534" fill="#64748b" font-size="8.5" text-anchor="middle">Save guess → UPSERT</text>
  <text x="296" y="546" fill="#64748b" font-size="8.5" text-anchor="middle">predictions +</text>
  <text x="296" y="558" fill="#64748b" font-size="8.5" text-anchor="middle">score_predictions</text>

  <text x="396" y="524" fill="#334155" font-size="18" text-anchor="middle">→</text>

  <rect x="412" y="480" width="160" height="88" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="492" y="497" fill="#93c5fd" font-size="10" font-weight="700" text-anchor="middle">LeaderboardPage</text>
  <text x="492" y="511" fill="#64748b" font-size="8.5" text-anchor="middle">Load all users +</text>
  <text x="492" y="522" fill="#64748b" font-size="8.5" text-anchor="middle">all predictions + results</text>
  <text x="492" y="534" fill="#64748b" font-size="8.5" text-anchor="middle">+ score_preds + API</text>
  <text x="492" y="546" fill="#64748b" font-size="8.5" text-anchor="middle">Calc pts per user</text>
  <text x="492" y="558" fill="#64748b" font-size="8.5" text-anchor="middle">Sort → display ranking</text>

  <text x="592" y="524" fill="#334155" font-size="18" text-anchor="middle">→</text>

  <rect x="608" y="480" width="216" height="88" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="716" y="497" fill="#93c5fd" font-size="10" font-weight="700" text-anchor="middle">AdminPage (admin only)</text>
  <text x="716" y="511" fill="#64748b" font-size="8.5" text-anchor="middle">Password-gated</text>
  <text x="716" y="522" fill="#64748b" font-size="8.5" text-anchor="middle">Fetch API → finished games</text>
  <text x="716" y="534" fill="#64748b" font-size="8.5" text-anchor="middle">Map EN names → HE</text>
  <text x="716" y="546" fill="#64748b" font-size="8.5" text-anchor="middle">UPSERT results table</text>
  <text x="716" y="558" fill="#64748b" font-size="8.5" text-anchor="middle">Manual fallback per match</text>

  <!-- Legend -->
  <rect x="20" y="588" width="820" height="4" rx="2" fill="#1e293b"/>
</svg>
